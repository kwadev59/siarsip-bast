services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: siarsip-bast-app
    container_name: siarsip-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - siarsip-network
      - internal-proxy

  db:
    image: mysql:8.0
    container_name: siarsip-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: siarsip_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: user_password
      MYSQL_USER: siarsip_user
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - siarsip-network

  nginx:
    image: nginx:alpine
    container_name: siarsip-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - siarsip-network
      - internal-proxy
    depends_on:
      - app
      - db

networks:
  siarsip-network:
    driver: bridge
  internal-proxy:
    external: true

volumes:
  dbdata:
    driver: local
